name: Evals

# Runs the nutrition-scan eval harness on PRs ONLY when the eval package or the shared
# extraction module change (path-filtered). It surfaces the comparison report for
# visibility and never gates merge: this is not a required check, and the eval run uses
# continue-on-error so model non-determinism on ~10 fixtures can't flake a PR red.
on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/nutrition-evals/**'
      - 'packages/nutrition-scan/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run evals
        continue-on-error: true
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: pnpm run test:evals

      - name: Ensure a report exists
        if: always()
        run: |
          test -f packages/nutrition-evals/eval-report.md \
            || echo "_No eval report generated (missing GOOGLE_GENERATIVE_AI_API_KEY?)._" \
              > packages/nutrition-evals/eval-report.md

      - name: Post report comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: nutrition-scan-evals
          path: packages/nutrition-evals/eval-report.md

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: packages/nutrition-evals/eval-report.md
