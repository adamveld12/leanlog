name: Design Review

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'docs/design-reference.md'
      - 'docs/design-system.md'
      - 'AGENTS.md'
      - '.agents/**'

jobs:
  claude-design-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude advisory design review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Provide an advisory Leanlog design-system review for this pull request.

            Review against docs/design-reference.md, docs/design-system.md, packages/ui/specs/*.md, and AGENTS.md.
            Check Atomic Design boundaries, page/template placement, Storybook template-only policy, recipe-approved class usage in packages/ui, app-page exemption from recipes.ts class-name allowlist, no .ll-* classes, no raw controls outside atoms, analytics values and scope decoration, accessibility, and mobile-first behavior.

            Comment with concise findings and mark whether each finding is blocking for deterministic lint/audit or advisory design feedback.
