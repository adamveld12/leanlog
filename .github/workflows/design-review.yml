name: Design Review

on:
  pull_request:
    # Only run when a .tsx file is edited — this is a UI/design-system review,
    # so non-component changes (package.json, lockfiles, docs) should not trigger it.
    paths:
      - 'apps/web/**/*.tsx'
      - 'packages/ui/**/*.tsx'

concurrency:
  group: design-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-design-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so the review can diff against the last-reviewed SHA.
          fetch-depth: 0

      # The review window is computed here, deterministically, instead of asking
      # the model to recover state from its own sticky comment (track_progress
      # overwrites that comment at job start, so comment-stored state never
      # survives between runs). The base is the head SHA of the last successful
      # run of this workflow on this branch; everything older is already reviewed.
      - name: Resolve review base
        id: review_base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          last=$(gh api "repos/${{ github.repository }}/actions/workflows/design-review.yml/runs?branch=${{ github.head_ref }}&event=pull_request&status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha // empty')
          if [ -n "$last" ] \
            && git cat-file -e "$last^{commit}" 2>/dev/null \
            && git merge-base --is-ancestor "$last" HEAD \
            && [ "$last" != "$(git rev-parse HEAD)" ]; then
            echo "base=$last" >> "$GITHUB_OUTPUT"
            echo "scope=incremental" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "scope=full" >> "$GITHUB_OUTPUT"
          fi
          echo "Review base: $(cat "$GITHUB_OUTPUT")"

      - name: Run Claude advisory design review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          additional_permissions: |
            actions: read
          prompt: |
            You are performing an advisory design-system review for this Leanlog pull request. This is a read-only review — do not modify any files or create branches.

            ## Review window (precomputed — do not re-derive)

            DELTA = `git diff ${{ steps.review_base.outputs.base }}..HEAD` (scope: ${{ steps.review_base.outputs.scope }}).

            Everything outside DELTA was approved by a previous review run. You MUST NOT raise findings, advisories, or notes on code that is unchanged since the base SHA — even if a written rule applies to it. If you notice such code, it is out of scope, full stop.

            When scope is `incremental`, the diff is usually a small fix-up responding to the previous review: keep the review proportional to it, verify the fix-up doesn't itself violate a rule, and do not expand back to the full PR.

            ## Step 1 — Deterministic checks (do not re-derive by eye)

            Run `node scripts/design-system-audit.mjs` and `pnpm -r lint` if dependencies install cleanly (`pnpm install --frozen-lockfile`). Their output IS the Blocking section: report each failure verbatim as `**[Blocking]**`. If they pass, the deterministic areas (recipe class duplication, .ll-* classes, raw controls, banned raw elements, story coverage, off-scale font sizes/radii, control margins) are clean — do not re-litigate them manually.

            ## Step 2 — Judgment review (9 areas, scoped to DELTA)

            Review DELTA against `docs/design-reference.md`, `docs/design-system.md`, `packages/ui/specs/*.md`, and `AGENTS.md`:

            1. **Atomic Design tier boundaries** — molecules/organisms/templates must not use raw HTML elements carrying text styling; only atoms may.
            2. **Template slot-based architecture** — templates accept ReactNode slots, not raw data props. App pages use the appropriate template.
            3. **Recipe-approved class usage** — judgment cases the audit script can't catch (e.g. a recipe value duplicated inline with different ordering).
            4. **No .ll-* classes** — covered by Step 1; only verify DELTA if the audit could not run.
            5. **Raw control usage** — covered by Step 1; only verify DELTA if the audit could not run.
            6. **Storybook story coverage** — every NEW component in atoms/molecules/organisms/templates has a `.stories.tsx`.
            7. **App page template usage** — app pages must not hand-build layouts that bypass templates.
            8. **Analytics scope decoration** — molecules/organisms/templates containing interactive atoms wrap them in `<AnalyticsScope>`.
            9. **Accessibility & mobile-first** — missing ARIA names, keyboard traps, max-width-first breakpoints, touch targets under 44px.

            ## Finding rules (severity floor — apply strictly)

            - A finding MUST cite a specific written rule from the docs above (quote or name the section). No citation → it is not a finding.
            - A finding MUST be on lines changed in DELTA. Pre-existing code — anything unchanged since `${{ steps.review_base.outputs.base }}` — is out of scope; do not report it, not even as "advisory" or "worth noting".
            - `**[Blocking]**` is reserved for Step 1 script failures and unambiguous written-rule violations.
            - `**[Advisory]**` is for cited-rule violations where remediation involves judgment.
            - Improvement ideas with no rule citation (refactors, "more durable patterns", forward-looking suggestions) go in an optional **#### Notes** section: maximum 2, one line each, and only about code in DELTA. When scope is `incremental`, omit the Notes section entirely.

            ## Step 3 — Completeness pass (before publishing)

            - For every finding, search the ENTIRE DELTA for other instances of the same pattern and fold them into that one finding with all locations listed. Do not leave sibling instances for a future run.
            - List every file in DELTA. Any file you have not explicitly considered, re-check now.
            - Sanity-check each finding against the severity floor; drop anything that fails it.

            ## Comment format

            Maintain the sticky comment progressively (checklist of the 9 areas, then findings), via `mcp__github_comment__update_claude_comment`. Final format:

            If findings exist:
            ```
            ### Design System Review

            **Result:** N finding(s) — B blocking, A advisory
            **Reviewed range:** ${{ steps.review_base.outputs.base }}..HEAD (${{ steps.review_base.outputs.scope }})

            #### Review Areas
            - [x] ...all 9...

            #### Findings
            [findings, each citing the rule violated]

            #### Notes
            [optional, max 2, non-gating, full scope only]

            #### Summary
            [1-2 sentences]
            ```

            If no findings:
            ```
            ### Design System Review — No Issues Found

            All 9 review areas passed for `${{ steps.review_base.outputs.base }}..HEAD` (${{ steps.review_base.outputs.scope }}). No blocking or advisory findings.

            #### Review Areas
            - [x] ...all 9...
            ```

            Always include the job run link.
