<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#151515" />
    <title>LeanLog · Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui;
        background: #f5f5f3;
        color: #151515;
      }
      .card {
        max-width: 28rem;
        border: 1px solid #d3d3d3;
        border-radius: 14px;
        background: #fff;
        padding: 1rem;
      }
      p {
        margin: 0;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #111111;
          color: #f3f3f3;
        }
        .card {
          background: #171717;
          border-color: #464646;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p>You are offline. Showing the latest cached LeanLog view when available.</p>
    </div>
  </body>
</html>
